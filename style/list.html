<ul id="nav"></ul><style>.icon{width:18px;height:18px;vertical-align:middle;margin-right:6px;fill:currentColor}</style><script src="https://code.jquery.com/jquery-3.6.0.min.js"></script><script>$(function(){$.getJSON("style/nav.json",function(data){let html="";data.forEach(function(item){if(item.hidden===true){html+=`<li style="opacity:0;pointer-events:auto;"><a href="${item.url||"#"}" target="_blank">${item.name||""}</a></li>`;return;}let icon="";if(item.iconSvg){icon=`<svg class="icon" aria-hidden="true"><use xlink:href="${item.iconSvg}"></use></svg>`;}else if(item.iconImg){icon=`<img src="${item.iconImg}" style="width:22px;height:22px;vertical-align:middle;margin-right:6px;">`;}if(item.type==="title"){html+=`<li class="title">${icon}${item.name}</li>`;}else if(item.type==="link"){html+=`<li><a href="${item.url}" target="_blank">${icon}${item.name}</a></li>`;}});$("#nav").html(html);});});</script>
